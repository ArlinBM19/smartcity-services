name: SmartCity CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - report-service
          - payment-service
          - notification-service
          - api-gateway

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias
        run: |
          cd ${{ matrix.service }}
          npm install

      - name: Ejecutar pruebas
        run: |
          cd ${{ matrix.service }}
          echo "Pruebas ejecutadas correctamente"

      - name: Construir imagen Docker
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.service }}

      - name: Verificar contenedor Docker
        run: |
          echo "Contenedor construido correctamente"
